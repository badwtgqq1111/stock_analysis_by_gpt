  <rect x="1255" y="170" width="290" height="100" fill="#ffffff" stroke="#f87171" class="card"/>
  <text x="1400" y="203" text-anchor="middle" class="box-title">策略运行时</text>
  <text x="1400" y="232" text-anchor="middle" class="box-text">沙箱 / 状态管理</text>

  <rect x="1255" y="290" width="290" height="100" fill="#ffffff" stroke="#f87171" class="card"/>
  <text x="1400" y="323" text-anchor="middle" class="box-title">日内信号生成</text>
