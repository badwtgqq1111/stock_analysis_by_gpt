  <text x="440" y="950" text-anchor="middle" class="box-text">延迟 / 吞吐 / 错误日志</text>

  <rect x="730" y="890" width="340" height="95" fill="#ffffff" stroke="#94a3b8" class="card"/>
  <text x="900" y="922" text-anchor="middle" class="box-title">CI/CD</text>
  <text x="900" y="950" text-anchor="middle" class="box-text">发布 / 回滚 / 自动测试</text>

  <rect x="1190" y="890" width="340" height="95" fill="#ffffff" stroke="#94a3b8" class="card"/>
  <text x="1360" y="922" text-anchor="middle" class="box-title">模型风险管理</text>
  <text x="1360" y="950" text-anchor="middle" class="box-text">审计 / 告警 / 版本治理</text>

  <line x1="320" y1="360" x2="390" y2="360" stroke="#4a5568" stroke-width="3" marker-end="url(#arrow)"/>
