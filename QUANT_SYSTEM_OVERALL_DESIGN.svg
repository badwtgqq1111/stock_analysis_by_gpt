<svg width="1800" height="1120" viewBox="0 0 1800 1120" xmlns="http://www.w3.org/2000/svg">
  <defs>
    <marker id="arrow" markerWidth="10" markerHeight="10" refX="9" refY="5" orient="auto" markerUnits="strokeWidth">
      <path d="M 0 0 L 10 5 L 0 10 z" fill="#4a5568"/>
    </marker>
    <marker id="arrow-dashed" markerWidth="10" markerHeight="10" refX="9" refY="5" orient="auto" markerUnits="strokeWidth">
      <path d="M 0 0 L 10 5 L 0 10 z" fill="#718096"/>
    </marker>
    <style>
      .title { font: 700 30px "Segoe UI", "PingFang SC", "Microsoft YaHei", sans-serif; fill: #1a202c; }
      .lane-title { font: 700 22px "Segoe UI", "PingFang SC", "Microsoft YaHei", sans-serif; fill: #1f2937; }
      .box-title { font: 700 18px "Segoe UI", "PingFang SC", "Microsoft YaHei", sans-serif; fill: #111827; }
      .box-text { font: 15px "Segoe UI", "PingFang SC", "Microsoft YaHei", sans-serif; fill: #374151; }
      .edge-label { font: 14px "Segoe UI", "PingFang SC", "Microsoft YaHei", sans-serif; fill: #4a5568; }
      .lane { rx: 16; ry: 16; stroke-width: 2; }
      .card { fill: #ffffff; stroke-width: 1.5; rx: 12; ry: 12; }
    </style>
  </defs>

  <rect x="0" y="0" width="1800" height="1120" fill="#f8fafc"/>
  <text x="900" y="50" text-anchor="middle" class="title">工业级量化交易系统总体架构</text>

  <rect x="40" y="100" width="280" height="520" fill="#dbeafe" stroke="#60a5fa" class="lane"/>
  <text x="180" y="138" text-anchor="middle" class="lane-title">数据源</text>

  <rect x="60" y="170" width="240" height="110" fill="#ffffff" stroke="#60a5fa" class="card"/>
  <text x="180" y="205" text-anchor="middle" class="box-title">实时行情</text>
  <text x="180" y="235" text-anchor="middle" class="box-text">Tick / OrderBook</text>

  <rect x="60" y="310" width="240" height="110" fill="#ffffff" stroke="#60a5fa" class="card"/>
