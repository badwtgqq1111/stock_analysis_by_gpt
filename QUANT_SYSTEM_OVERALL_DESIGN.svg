  <path d="M 560 720 L 560 740" stroke="#4a5568" stroke-width="2.5" fill="none" marker-end="url(#arrow)"/>
  <path d="M 980 720 L 980 740" stroke="#4a5568" stroke-width="2.5" fill="none" marker-end="url(#arrow)"/>
  <path d="M 1400 720 L 1400 740" stroke="#4a5568" stroke-width="2.5" fill="none" marker-end="url(#arrow)"/>

  <path d="M 500 810 L 500 720" stroke="#718096" stroke-width="2.5" stroke-dasharray="8 8" fill="none" marker-end="url(#arrow-dashed)"/>
  <path d="M 900 810 L 900 720" stroke="#718096" stroke-width="2.5" stroke-dasharray="8 8" fill="none" marker-end="url(#arrow-dashed)"/>
  <path d="M 1300 810 L 1300 720" stroke="#718096" stroke-width="2.5" stroke-dasharray="8 8" fill="none" marker-end="url(#arrow-dashed)"/>
