  <text x="560" y="323" text-anchor="middle" class="box-title">内存数据库</text>
  <text x="560" y="352" text-anchor="middle" class="box-text">Redis / Memcached</text>

  <rect x="415" y="410" width="290" height="100" fill="#ffffff" stroke="#4ade80" class="card"/>
