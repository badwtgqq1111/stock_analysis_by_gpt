  <text x="1400" y="472" text-anchor="middle" class="box-text">下单 / 拆单 / 反拆单</text>

  <rect x="1255" y="530" width="290" height="130" fill="#ffffff" stroke="#f87171" class="card"/>
  <text x="1400" y="563" text-anchor="middle" class="box-title">订单与仓位管理</text>
  <text x="1400" y="592" text-anchor="middle" class="box-text">OEMS / 账户状态</text>
