  <line x1="730" y1="360" x2="800" y2="360" stroke="#4a5568" stroke-width="3" marker-end="url(#arrow)"/>
  <text x="765" y="345" text-anchor="middle" class="edge-label">高性能读写与计算</text>

  <line x1="1160" y1="360" x2="1230" y2="360" stroke="#4a5568" stroke-width="3" marker-end="url(#arrow)"/>
  <text x="1195" y="345" text-anchor="middle" class="edge-label">策略信号与权重</text>

  <line x1="1570" y1="375" x2="1610" y2="375" stroke="#4a5568" stroke-width="3" marker-end="url(#arrow)"/>
