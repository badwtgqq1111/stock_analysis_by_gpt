  <rect x="415" y="170" width="290" height="100" fill="#ffffff" stroke="#4ade80" class="card"/>
  <text x="560" y="203" text-anchor="middle" class="box-title">数据采集与清洗</text>
  <text x="560" y="232" text-anchor="middle" class="box-text">ETL Pipeline</text>

