  <text x="180" y="515" text-anchor="middle" class="box-text">财报 / 公告 / 舆情</text>
  <text x="180" y="540" text-anchor="middle" class="box-text">产业链 / 其他外部数据</text>

  <rect x="390" y="100" width="340" height="620" fill="#dcfce7" stroke="#4ade80" class="lane"/>
